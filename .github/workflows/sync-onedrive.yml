name: Sync OneDrive to Supabase
on:
  schedule:
    - cron: '30 0 * * 1-6'   # 6:00 AM IST (00:30 AM UTC), Mon-Sat
  workflow_dispatch: {}        # Manual trigger via GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    # Headroom over the script's internal 15m run deadline (SYNC_DEADLINE_MS), which
    # is the real guarantee the upsert is reached before GitHub kills the job.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # The sync relies on AbortSignal.any (Node ≥ 20.3) to compose per-request
      # timeouts with the run deadline. Fail fast & loud if the runner lacks it.
      - name: Assert AbortSignal.any is available
        run: node -e "if (typeof AbortSignal.any !== 'function') { console.error('AbortSignal.any missing — Node too old'); process.exit(1); } console.log('AbortSignal.any OK on', process.version)"
      - run: npm ci --ignore-scripts
      - name: Sync OneDrive data to Supabase
        run: npx tsx scripts/sync-to-supabase.ts
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_DRIVE_ID: ${{ secrets.GRAPH_DRIVE_ID }}
          GRAPH_OCTOPUS_ITEM_ID: ${{ secrets.GRAPH_OCTOPUS_ITEM_ID }}
          GRAPH_VF_FOLDER_PATH: ${{ secrets.GRAPH_VF_FOLDER_PATH }}
          GRAPH_VF_FOLDER_ID: ${{ secrets.GRAPH_VF_FOLDER_ID }}
          GRAPH_POSITIONS_FOLDER_ID: ${{ secrets.GRAPH_POSITIONS_FOLDER_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
