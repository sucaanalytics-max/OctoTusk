name: Sync OneDrive to Supabase
on:
  schedule:
    - cron: '40 2 * * 1-6'   # 8:10 AM IST (2:40 AM UTC), Mon-Sat
  workflow_dispatch: {}        # Manual trigger via GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - name: Sync OneDrive data to Supabase
        run: npx tsx scripts/sync-to-supabase.ts
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_DRIVE_ID: ${{ secrets.GRAPH_DRIVE_ID }}
          GRAPH_OCTOPUS_ITEM_ID: ${{ secrets.GRAPH_OCTOPUS_ITEM_ID }}
          GRAPH_VF_FOLDER_PATH: ${{ secrets.GRAPH_VF_FOLDER_PATH }}
          GRAPH_VF_FOLDER_ID: ${{ secrets.GRAPH_VF_FOLDER_ID }}
          GRAPH_POSITIONS_FOLDER_ID: ${{ secrets.GRAPH_POSITIONS_FOLDER_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
