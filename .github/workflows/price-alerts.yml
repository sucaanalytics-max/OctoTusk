name: Price near-target alerts
# Scheduled triggering moved to Vercel Cron (vercel.json) on 2026-06-12 —
# GitHub's shared cron fired ~1 in 25 slots. Kept for manual runs only.
on:
  workflow_dispatch: {}        # Manual trigger via GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call alert check endpoint
        run: |
          curl -fsS --max-time 90 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.APP_URL }}/api/alerts/check"
