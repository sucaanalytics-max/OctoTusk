name: Price near-target alerts
on:
  schedule:
    # Every 15 min, ~08:30-16:00 IST window (UTC 03:00-10:45), Mon-Fri.
    # /api/alerts/check itself skips when the market is closed, so the
    # extra firings at the edges are harmless no-ops.
    - cron: '*/15 3-10 * * 1-5'
  workflow_dispatch: {}        # Manual trigger via GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call alert check endpoint
        run: |
          curl -fsS --max-time 90 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.APP_URL }}/api/alerts/check"
