name: Refresh Dhan access token

# DhanHQ access tokens expire 24h after generation. This mints a fresh one each
# morning (headless PIN + TOTP), writes it to the Vercel production env var
# DHAN_ACCESS_TOKEN, and triggers a redeploy. Run on-demand via "Run workflow".
#
# Required repo secrets:
#   DHAN_CLIENT_ID, DHAN_PIN, DHAN_TOTP_SECRET,
#   VERCEL_TOKEN, VERCEL_PROJECT_ID, VERCEL_TEAM_ID, VERCEL_DEPLOY_HOOK_URL

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC = 08:30 IST, before market open
  workflow_dispatch: {}

concurrency:
  group: refresh-dhan-token
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - name: Mint Dhan token + update Vercel + redeploy
        run: npx tsx scripts/refresh-dhan-token.ts
        env:
          DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_PIN: ${{ secrets.DHAN_PIN }}
          DHAN_TOTP_SECRET: ${{ secrets.DHAN_TOTP_SECRET }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
